<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — NexChat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
</head>
<body>
<div id="reset-screen" class="auth-screen">
  <div class="auth-bg">
    <div class="auth-orb orb1"></div>
    <div class="auth-orb orb2"></div>
    <div class="auth-orb orb3"></div>
    <div class="auth-grid"></div>
  </div>
  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <rect width="56" height="56" rx="18" fill="url(#rGrad)"/>
          <path d="M28 11C18.06 11 10 18.16 10 27c0 4.8 2.1 9.14 5.5 12.2L13 44l6-2A18.9 18.9 0 0028 45c9.94 0 18-7.16 18-16S37.94 11 28 11z" fill="white" fill-opacity=".9"/>
          <circle cx="21" cy="27" r="2.5" fill="url(#rGrad)"/>
          <circle cx="28" cy="27" r="2.5" fill="url(#rGrad)"/>
          <circle cx="35" cy="27" r="2.5" fill="url(#rGrad)"/>
          <defs>
            <linearGradient id="rGrad" x1="0" y1="0" x2="56" y2="56">
              <stop offset="0%" stop-color="#818CF8"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="auth-title">NexChat</h1>
      <p class="auth-subtitle">Redefinir senha</p>
    </div>

    <div class="auth-card">
      <p class="reset-desc" id="reset-desc">Digite sua nova senha abaixo.</p>
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" id="reset-password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" id="reset-confirm" placeholder="Repita a senha" />
      </div>
      <div id="reset-error" class="auth-error hidden"></div>
      <div id="reset-success" class="auth-success hidden"></div>
      <button class="btn-primary" id="reset-btn">Redefinir Senha</button>
      <a href="/" class="forgot-link" style="text-align:center;display:block;margin-top:16px;">← Voltar ao login</a>
    </div>
  </div>
</div>

<script>
  // Inline reset logic (no socket.io needed here)
  function showError(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const errEl = document.getElementById('reset-error');
    const btn = document.getElementById('reset-btn');
    const desc = document.getElementById('reset-desc');

    if (!token) {
      showError(errEl, 'Link inválido. Solicite uma nova recuperação de senha.');
      btn.disabled = true;
      return;
    }

    try {
      const res = await fetch(`/api/reset-token/${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!data.valid) {
        showError(errEl, 'Este link é inválido ou já expirou. Solicite uma nova recuperação de senha.');
        btn.disabled = true;
        desc.style.display = 'none';
        document.getElementById('reset-password').style.display = 'none';
        document.getElementById('reset-confirm').style.display = 'none';
        document.querySelectorAll('.form-group').forEach(el => el.style.display = 'none');
        return;
      }
    } catch {
      showError(errEl, 'Erro ao validar link. Tente novamente.');
      return;
    }

    btn.addEventListener('click', () => doReset(token));
    document.getElementById('reset-confirm').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset(token);
    });
  }

  async function doReset(token) {
    const password = document.getElementById('reset-password').value;
    const confirm = document.getElementById('reset-confirm').value;
    const errEl = document.getElementById('reset-error');
    const successEl = document.getElementById('reset-success');
    const btn = document.getElementById('reset-btn');
    errEl.classList.add('hidden');
    successEl.classList.add('hidden');

    if (!password || !confirm) return showError(errEl, 'Preencha os dois campos');
    if (password.length < 6) return showError(errEl, 'Senha mínima de 6 caracteres');
    if (password !== confirm) return showError(errEl, 'As senhas não coincidem');

    btn.textContent = 'Salvando...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(errEl, data.error);
        btn.textContent = 'Redefinir Senha';
        btn.disabled = false;
        return;
      }
      successEl.textContent = '✅ ' + data.message;
      successEl.classList.remove('hidden');
      btn.textContent = 'Senha redefinida!';
      setTimeout(() => { window.location.href = '/'; }, 2500);
    } catch(err) {
      console.error('Erro:', err);
      showError(errEl, 'Erro de conexão: ' + (err.message || 'Tente novamente'));
      btn.textContent = 'Redefinir Senha';
      btn.disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
